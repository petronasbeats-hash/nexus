<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>NEXUS</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="theme-color" content="#020617" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="NEXUS" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #000; color: #cffafe;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    height: 100vh; height: 100dvh; overflow: hidden;
  }
  .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; height: 100dvh; padding: 24px; position: relative; overflow: hidden; }
  #particles { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .screen > .card { position: relative; z-index: 1; }
  .hidden { display: none !important; }
  .logo-wrap { margin-bottom: 8px; }
  .dove-logo-img {
    width: 176px; height: auto; filter: drop-shadow(0 0 18px rgba(34,211,238,0.35));
    animation: dove-float 3.4s ease-in-out infinite;
  }
  @keyframes dove-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  h1.brand { font-size: 2.4rem; font-weight: 300; letter-spacing: 0.25em; color: #67e8f9; text-shadow: 0 0 20px rgba(34,211,238,0.6); margin: 0 0 16px; text-align: center; }
  p.tag1 { color: rgba(207,250,254,0.7); font-size: 0.9rem; text-align: center; margin: 0 0 4px; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
  p.counter { color: #22d3ee; font-size: 0.72rem; text-align: center; margin: 0 0 28px; letter-spacing: 0.05em; min-height: 16px; }
  .card { width: 100%; max-width: 360px; }
  .node-input-wrap { margin: 4px 0 4px; }
  .node-input {
    width: 100%; box-sizing: border-box; padding: 16px 18px; border-radius: 16px;
    border: 1px solid rgba(21,94,117,0.6); background: rgba(8,51,68,0.35);
    color: #e0fbff; font-family: inherit; font-size: 1rem; text-align: center;
    letter-spacing: 0.2em; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .node-input::placeholder { color: rgba(207,250,254,0.35); letter-spacing: normal; }
  .node-input:focus { border-color: #22d3ee; box-shadow: 0 0 20px rgba(34,211,238,0.3); }
  .node-input:disabled { opacity: 0.5; }
  .error-msg { color: #f87171; font-size: 0.78rem; text-align: center; margin-top: 12px; line-height: 1.5; }
  .footnote { color: #164e63; font-size: 0.72rem; text-align: center; margin-top: 28px; display: flex; align-items: center; justify-content: center; gap: 6px; }

  .anim-overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(2,10,14,0.82);
  }
  .anim-overlay.hidden { display: none; }
  .anim-icon { font-size: 5.5rem; display: inline-block; }
  @keyframes rayo-zap {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; filter: drop-shadow(0 0 0 rgba(125,211,252,0)); }
    18% { transform: scale(1.35) rotate(8deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(125,211,252,0.95)); }
    35% { transform: scale(0.9) rotate(-5deg); }
    50% { transform: scale(1.2) rotate(5deg); filter: drop-shadow(0 0 35px rgba(224,242,254,1)); }
    70% { transform: scale(0.98) rotate(-2deg); }
    100% { transform: scale(1.05) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(125,211,252,0.9)); }
  }
  .anim-icon.rayo { animation: rayo-zap 0.9s ease-out forwards; }
  @keyframes flash-white {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }
  .anim-overlay.rayo-flash::before {
    content: ''; position: absolute; inset: 0; background: #e0f2fe; animation: flash-white 0.35s ease-out;
  }
  @keyframes llama-burn {
    0% { transform: scale(0.4) translateY(12px) rotate(0deg); opacity: 0; }
    20% { transform: scale(1.2) translateY(-6px) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(251,146,60,0.95)); }
    40% { transform: scale(0.92) translateY(0) rotate(4deg); }
    60% { transform: scale(1.12) translateY(-4px) rotate(-4deg); filter: drop-shadow(0 0 35px rgba(248,113,113,1)); }
    80% { transform: scale(0.98) rotate(3deg); }
    100% { transform: scale(1.05) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 25px rgba(248,113,113,0.9)); }
  }
  .anim-icon.llama { animation: llama-burn 0.9s ease-out forwards; }

  .chat-app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }
  header.chat-header { border-bottom: 1px solid rgba(22,78,99,0.5); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header.chat-header .brand-mini { display: flex; align-items: center; gap: 8px; }
  header.chat-header .brand-mini span { color: #67e8f9; font-size: 0.85rem; letter-spacing: 0.2em; text-shadow: 0 0 10px rgba(34,211,238,0.5); }
  .streak-badge { color: #fbbf24 !important; font-size: 0.68rem !important; letter-spacing: 0 !important; text-shadow: none !important; background: rgba(120,53,15,0.3); border: 1px solid rgba(217,119,6,0.4); border-radius: 10px; padding: 2px 7px; }
  .connect-pulse { position: absolute; inset: 0; pointer-events: none; z-index: -1; opacity: 0; }
  .connect-pulse.active { animation: pulse-wave 1.4s ease-out; }
  @keyframes pulse-wave {
    0% { opacity: 0.6; background: radial-gradient(circle at 50% 0%, rgba(52,211,153,0.35), transparent 55%); }
    100% { opacity: 0; background: radial-gradient(circle at 50% 0%, rgba(52,211,153,0), transparent 55%); }
  }
  .ticks { margin-left: 4px; opacity: 0.55; }
  .ticks.read { color: #4f46e5; opacity: 1; }
  header.chat-header .who { color: #0e7490; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; display: inline-block; }
  .status-dot.online { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.9); animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  .partner-status { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .partner-status .status-line { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #67e8f9; }
  .partner-status .last-seen { font-size: 0.64rem; color: #164e63; }

  .header-actions { display: flex; align-items: center; gap: 12px; }
  .call-btn {
    background: rgba(8,51,68,0.4); border: 1px solid rgba(34,211,238,0.4); color: #67e8f9;
    border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .call-btn:hover, .call-btn:active { background: rgba(34,211,238,0.2); box-shadow: 0 0 12px rgba(34,211,238,0.4); }
  .call-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .call-overlay {
    position: fixed; inset: 0; z-index: 60; background: rgba(2,6,10,0.97);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  .call-overlay.hidden { display: none; }
  .call-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .call-panel.hidden { display: none; }
  .call-avatar-pulse {
    font-size: 2.6rem; width: 92px; height: 92px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: rgba(8,51,68,0.5); border: 2px solid #22d3ee; animation: call-pulse 1.4s ease-in-out infinite;
  }
  @keyframes call-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,0.5); }
    50% { box-shadow: 0 0 0 18px rgba(34,211,238,0); }
  }
  .call-title { color: #cffafe; font-size: 1rem; text-align: center; margin: 0; }
  .call-actions { display: flex; gap: 30px; }
  .call-action { width: 58px; height: 58px; border-radius: 50%; border: none; font-size: 1.3rem; cursor: pointer; color: #fff; }
  .call-action.accept { background: #16a34a; }
  .call-action.decline { background: #dc2626; }
  .call-video-wrap { position: relative; width: 100%; height: 100%; display: none; }
  .call-video-wrap.active { display: block; }
  .call-video-wrap video#remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
  .call-video-wrap video#local-video {
    position: absolute; bottom: 110px; right: 16px; width: 104px; height: 142px; object-fit: cover;
    border-radius: 14px; border: 2px solid #22d3ee; background: #000;
  }
  .call-controls { position: absolute; bottom: 26px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; }
  .call-icon-btn {
    width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1); color: #fff; font-size: 1.2rem; cursor: pointer;
  }
  .call-icon-btn.hangup { background: #dc2626; border-color: #dc2626; }
  .call-error { color: #f87171; font-size: 0.8rem; text-align: center; padding: 0 20px; }
  .call-error.hidden { display: none; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
  .empty-msg { color: #164e63; font-size: 0.85rem; text-align: center; margin-top: 40px; }
  .msg-row { display: flex; flex-direction: column; margin-bottom: 6px; }
  .msg-row.mine { align-items: flex-end; }
  .msg-row.theirs { align-items: flex-start; }
  .bubble { max-width: 75%; border-radius: 14px; padding: 8px 12px; font-size: 0.9rem; position: relative; }
  .bubble.mine { background: #22d3ee; color: #020617; }
  .bubble.theirs { background: rgba(8,51,68,0.4); color: #cffafe; border: 1px solid rgba(21,94,117,0.5); }
  .bubble .sender { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: #06b6d4; margin-bottom: 2px; }
  .bubble .time { font-size: 0.62rem; margin-top: 4px; text-align: right; }
  .bubble.mine .time { color: rgba(2,6,23,0.6); }
  .bubble.theirs .time { color: #155e75; }
  .bubble.media-bubble { background: transparent; border: none; padding: 0; max-width: 65%; }
  .bubble.media-bubble img { width: 100%; border-radius: 10px; display: block; }
  .bubble.media-bubble .time { color: #155e75; margin-top: 2px; }
  .bubble.audio-bubble { display: flex; flex-direction: column; gap: 4px; min-width: 220px; }
  .bubble.audio-bubble audio { width: 100%; height: 34px; }

  .reaction-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
  .reaction-chip { background: rgba(8,51,68,0.5); border: 1px solid rgba(21,94,117,0.6); border-radius: 20px; padding: 1px 7px; font-size: 0.72rem; cursor: pointer; }
  .reaction-chip.mine-reacted { border-color: #22d3ee; background: rgba(34,211,238,0.15); }

  .reaction-bar {
    position: absolute; left: 0; right: 0; bottom: 100%;
    background: #050b0e; border-top: 1px solid rgba(22,78,99,0.5);
    display: flex; justify-content: center; gap: 14px; padding: 10px;
  }
  .reaction-bar span { font-size: 1.6rem; cursor: pointer; }

  .typing-banner { color: #22d3ee; font-size: 0.75rem; padding: 4px 16px; height: 18px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .typing-banner.visible { opacity: 1; }
  .typing-dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: #22d3ee; margin-right: 2px; animation: typing-bounce 1.1s infinite ease-in-out; }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-3px); opacity: 1; } }

  form.composer { border-top: 1px solid rgba(22,78,99,0.5); padding: 10px 12px; display: flex; gap: 6px; flex-shrink: 0; position: relative; align-items: center; }
  form.composer input[type=text] { flex: 1; background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5); border-radius: 10px; padding: 10px 14px; color: #ecfeff; font-family: inherit; font-size: 0.9rem; min-width: 0; }
  form.composer input::placeholder { color: #155e75; }
  form.composer input[type=text]:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 0 2px rgba(34,211,238,0.3); }
  form.composer button.icon-btn, form.composer button#send-btn {
    background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5); border-radius: 10px;
    padding: 0 10px; height: 38px; cursor: pointer; font-size: 1.05rem; color: #67e8f9; flex-shrink: 0;
  }
  form.composer button#send-btn { background: #22d3ee; color: #020617; }
  form.composer button#send-btn:disabled { background: #083344; color: #155e75; cursor: not-allowed; }
  form.composer button.icon-btn.recording { background: #b91c1c; border-color: #ef4444; color: #fff; }

  .attach-menu, .sticker-panel {
    position: absolute; left: 0; right: 0; bottom: 100%;
    background: #050b0e; border-top: 1px solid rgba(22,78,99,0.5);
  }
  .attach-menu { display: flex; flex-direction: column; }
  .attach-option { padding: 14px; font-size: 0.9rem; color: #cffafe; cursor: pointer; border-bottom: 1px solid rgba(22,78,99,0.3); }
  .attach-option:last-child { border-bottom: none; }

  .sticker-panel { max-height: 55vh; display: flex; flex-direction: column; }
  .sticker-tabs { display: flex; gap: 6px; padding: 10px 10px 0; overflow-x: auto; flex-shrink: 0; }
  .sticker-tab { background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5); color: #a5f3fc; border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; white-space: nowrap; cursor: pointer; }
  .sticker-tab.active { border-color: #22d3ee; background: rgba(34,211,238,0.15); }
  .sticker-tab.add-tab { color: #67e8f9; font-weight: bold; }
  .sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; overflow-y: auto; }
  .sticker-grid img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px; background: rgba(8,51,68,0.2); cursor: pointer; border: 1px solid transparent; }
  .sticker-empty { color: #164e63; font-size: 0.8rem; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="join-screen" class="screen">
  <canvas id="particles"></canvas>
  <div class="card">
    <div class="logo-wrap" style="display:flex; justify-content:center;">
      <img src="/logo-nexus.png" alt="Nexus" class="dove-logo-img" width="176" height="187" />
    </div>
    <p class="tag1">Tu Paloma Digital Personal</p>
    <p class="counter" id="counter"></p>

    <div class="node-input-wrap">
      <input type="password" id="node-input" class="node-input" placeholder="Escribe el nombre del nodo" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" />
    </div>
    <p class="error-msg hidden" id="join-error"></p>

    <p class="footnote">🔒 Escribe el nombre de la otra persona, no el tuyo.</p>
  </div>

  <div class="anim-overlay hidden" id="anim-overlay">
    <span class="anim-icon" id="anim-icon"></span>
  </div>
</div>

<div id="chat-screen" class="chat-app hidden">
  <div class="connect-pulse" id="connect-pulse"></div>
  <header class="chat-header">
    <div class="brand-mini">
      <img src="/icon-192.png" alt="" width="22" height="22" style="border-radius:6px;" aria-hidden="true" />
      <span>NEXUS</span>
      <span class="streak-badge hidden" id="streak-badge"></span>
    </div>
    <div class="header-actions">
      <button type="button" class="call-btn" id="call-btn" title="Videollamada" aria-label="Iniciar videollamada">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l5-3v10l-5-3M4 6h9a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
      </button>
      <div class="partner-status">
        <span class="status-line"><span class="status-dot" id="partner-dot"></span><span id="partner-name"></span></span>
        <span class="last-seen" id="partner-lastseen"></span>
      </div>
    </div>
  </header>

  <div class="messages" id="messages"></div>
  <div class="typing-banner" id="typing-banner"></div>

  <form class="composer" id="composer">
    <div class="reaction-bar hidden" id="reaction-bar">
      <span data-emoji="👍">👍</span><span data-emoji="❤️">❤️</span><span data-emoji="😂">😂</span>
      <span data-emoji="😮">😮</span><span data-emoji="🔥">🔥</span><span data-emoji="👀">👀</span>
    </div>
    <div class="attach-menu hidden" id="attach-menu">
      <div class="attach-option" id="opt-sticker">🖼️ Sticker</div>
      <div class="attach-option" id="opt-photo">📷 Foto</div>
    </div>
    <div class="sticker-panel hidden" id="sticker-panel">
      <div class="sticker-tabs" id="sticker-tabs"></div>
      <div class="sticker-grid" id="sticker-grid"></div>
    </div>

    <button type="button" class="icon-btn" id="attach-toggle">➕</button>
    <button type="button" class="icon-btn" id="record-btn">🎤</button>
    <button type="button" class="icon-btn" id="pensando-btn">💭</button>
    <input id="draft" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
    <button type="submit" id="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
      </svg>
    </button>
  </form>
  <input type="file" id="file-input" accept="image/*" multiple class="hidden" />
  <input type="file" id="photo-input" accept="image/*" class="hidden" />
</div>

<div class="call-overlay hidden" id="call-overlay">
  <div class="call-panel" id="call-panel-entrante">
    <div class="call-avatar-pulse">📞</div>
    <p class="call-title">Llamada entrante de <span id="call-caller-name"></span></p>
    <div class="call-actions">
      <button type="button" class="call-action decline" id="btn-rechazar-llamada" aria-label="Rechazar">✕</button>
      <button type="button" class="call-action accept" id="btn-aceptar-llamada" aria-label="Aceptar">✓</button>
    </div>
  </div>

  <div class="call-panel hidden" id="call-panel-saliente">
    <div class="call-avatar-pulse">📞</div>
    <p class="call-title">Llamando…</p>
    <button type="button" class="call-action decline" id="btn-cancelar-llamada" aria-label="Cancelar">✕</button>
  </div>

  <div class="call-video-wrap" id="call-video-wrap">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-controls">
      <button type="button" class="call-icon-btn" id="btn-toggle-mic">🎙️</button>
      <button type="button" class="call-icon-btn" id="btn-toggle-cam">🎥</button>
      <button type="button" class="call-icon-btn hangup" id="btn-colgar" aria-label="Colgar">✕</button>
    </div>
  </div>

  <p class="call-error hidden" id="call-error"></p>
</div>


<script>
  const POLL_MS = 2500;
  let miNombre = null;
  let miNodo = null;
  let pollTimer = null;
  let typingTimer = null;
  let stickerPacks = [];
  let activePackId = null;
  let lastMsgCount = 0;
  let reactionTarget = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let titleFlashTimer = null;
  const originalTitle = document.title;
  let presenceHeartbeat = null;
  let presencePoll = null;
  let lastMsgs = [];
  let partnerReadUpTo = 0;
  let partnerWasOnline = null;
  let audioCtx = null;

  // ---- Estado de videollamada ----
  const RTC_CONFIG = { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]};
  let callPollTimer = null;
  let pc = null;
  let localStream = null;
  let callState = 'inactiva'; // inactiva | llamando_saliente | llamando_entrante | en_llamada
  let callId = null;
  let candidatosAplicadosIndex = 0;
  let ofertaEntrante = null;
  let ringTimer = null;
  let ringTimeout = null;

  const joinScreen = document.getElementById('join-screen');
  const chatScreen = document.getElementById('chat-screen');
  const joinError = document.getElementById('join-error');
  const messagesEl = document.getElementById('messages');
  const composer = document.getElementById('composer');
  const draftInput = document.getElementById('draft');
  const sendBtn = document.getElementById('send-btn');
  const attachToggle = document.getElementById('attach-toggle');
  const attachMenu = document.getElementById('attach-menu');
  const optSticker = document.getElementById('opt-sticker');
  const optPhoto = document.getElementById('opt-photo');
  const stickerPanel = document.getElementById('sticker-panel');
  const stickerTabs = document.getElementById('sticker-tabs');
  const stickerGrid = document.getElementById('sticker-grid');
  const fileInput = document.getElementById('file-input');
  const photoInput = document.getElementById('photo-input');
  const recordBtn = document.getElementById('record-btn');
  const pensandoBtn = document.getElementById('pensando-btn');
  const typingBanner = document.getElementById('typing-banner');
  const reactionBar = document.getElementById('reaction-bar');

  const nodeInput = document.getElementById('node-input');

  // ---- Partículas de fondo ----
  let particlesRAF = null;
  function initParticles() {
    const canvas = document.getElementById('particles');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
      w = canvas.width = canvas.offsetWidth;
      h = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const N = 34;
    particles = Array.from({ length: N }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
    }));

    function tick() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if (dist < 110) {
            ctx.strokeStyle = `rgba(34,211,238,${(1 - dist / 110) * 0.25})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      for (const p of particles) {
        ctx.fillStyle = 'rgba(103,232,249,0.6)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      particlesRAF = requestAnimationFrame(tick);
    }
    tick();
  }
  initParticles();

  function stopParticles() {
    if (particlesRAF) cancelAnimationFrame(particlesRAF);
  }

  async function join(nombreQueBuscas) {
    desbloquearAudio();
    joinError.classList.add('hidden');
    nodeInput.disabled = true;
    try {
      const res = await fetch('/api/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombreQueBuscas })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        joinError.textContent = data.error || 'No se pudo entrar.';
        joinError.classList.remove('hidden');
        nodeInput.disabled = false;
        nodeInput.value = '';
        animLock = false;
        nodeInput.focus();
        return;
      }
      miNombre = data.miNombre;
      miNodo = nombreQueBuscas;

      stopParticles();
      joinScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      await refreshMessages(true);
      await loadStickerPacks();
      enviarPresencia();
      pollPresence();
      pollTimer = setInterval(() => { refreshMessages(false); pollTyping(); }, POLL_MS);
      presenceHeartbeat = setInterval(enviarPresencia, 5000);
      presencePoll = setInterval(pollPresence, 5000);

      joinError.classList.remove('hidden');

      nodeInput.value = '';

  async function refreshMessages(esInicial) {
    try {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      if (!esInicial && msgs.length > lastMsgCount) {
        const nuevo = msgs[msgs.length - 1];
        if (nuevo.de !== miNombre) notificarNuevoMensaje(nuevo);
      }
      lastMsgCount = msgs.length;
      lastMsgs = msgs;
      renderMessages(msgs);
      actualizarRacha(msgs);
      if (!document.hidden && document.hasFocus() && msgs.length) {
        marcarLeido(msgs[msgs.length - 1].hora);
      }
    } catch (e) {
      console.error('No se pudo actualizar', e);

  function notificarNuevoMensaje(msg) {
    let preview = 'Nuevo mensaje';
    if (msg.texto) preview = msg.texto;
    else if (msg.sticker) preview = 'te mandó un sticker';
    else if (msg.imagen) preview = 'te mandó una foto';
    else if (msg.audio) preview = 'te mandó una nota de voz';

    reproducirTono();
    if (navigator.vibrate) navigator.vibrate(40);

    if (document.hidden || !document.hasFocus()) {
      startTitleFlash();
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('NEXUS', { body: preview }); } catch (e) {}
      }
    }
  }

  // ---- Sonido de notificación (Web Audio API, sin archivos externos) ----
  function desbloquearAudio() {
    try { audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) {}
  }
  function reproducirTono() {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(880, t);
      o.frequency.exponentialRampToValueAtTime(587, t + 0.18);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.22, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.35);
    } catch (e) {}
  }

  // ==================== VIDEOLLAMADA ====================

  function iniciarTonoLlamada() {
    detenerTonoLlamada();
    desbloquearAudio();
    reproducirTono();
    if (navigator.vibrate) navigator.vibrate([400, 300, 400, 300, 400]);
    ringTimer = setInterval(() => {
      reproducirTono();
      if (navigator.vibrate) navigator.vibrate([400, 300, 400, 300, 400]);
    }, 1600);
  }
  function detenerTonoLlamada() {
    if (ringTimer) { clearInterval(ringTimer); ringTimer = null; }
    if (navigator.vibrate) navigator.vibrate(0);
  }

  function mostrarOverlayLlamada(tipo, nombreOtro) {
    const overlay = document.getElementById('call-overlay');
    const panelEntrante = document.getElementById('call-panel-entrante');
    const panelSaliente = document.getElementById('call-panel-saliente');
    const videoWrap = document.getElementById('call-video-wrap');
    overlay.classList.remove('hidden');
    panelEntrante.classList.add('hidden');
    panelSaliente.classList.add('hidden');
    videoWrap.classList.remove('active');
    document.getElementById('call-error').classList.add('hidden');
    if (tipo === 'entrante') {
      document.getElementById('call-caller-name').textContent = nombreOtro || '';
      panelEntrante.classList.remove('hidden');
    } else if (tipo === 'saliente') {
      panelSaliente.classList.remove('hidden');
    } else if (tipo === 'activa') {
      videoWrap.classList.add('active');
    }
  }
  function ocultarOverlayLlamada() {
    document.getElementById('call-overlay').classList.add('hidden');
    const rv = document.getElementById('remote-video'); rv.srcObject = null;
    const lv = document.getElementById('local-video'); lv.srcObject = null;
    document.getElementById('btn-toggle-mic').textContent = '🎙️';
    document.getElementById('btn-toggle-cam').textContent = '🎥';
  }
  function mostrarErrorLlamada(msg) {
    const e = document.getElementById('call-error');
    e.textContent = msg;
    e.classList.remove('hidden');
  }
  function mostrarVideoLocal(stream) { document.getElementById('local-video').srcObject = stream; }
  function mostrarVideoRemoto(stream) { document.getElementById('remote-video').srcObject = stream; }

  function crearPeerConnection() {
    pc = new RTCPeerConnection(RTC_CONFIG);
    pc.ontrack = (e) => { mostrarVideoRemoto(e.streams[0]); };
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        fetch('/api/call', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accion: 'candidato', de: miNombre, callId, candidato: e.candidate.toJSON() })
        }).catch(() => {});
      }
    };
    pc.onconnectionstatechange = () => {
      if (pc && ['disconnected', 'failed', 'closed'].includes(pc.connectionState) && callState === 'en_llamada') {
        terminarLlamada();
      }
    };
  }

  async function aplicarCandidatosNuevos(data) {
    if (!pc) return;
    const otro = miNombre === 'Zapien' ? 'Noriega' : 'Zapien';
    const lista = (data.candidatos && data.candidatos[otro]) || [];
    for (; candidatosAplicadosIndex < lista.length; candidatosAplicadosIndex++) {
      try { await pc.addIceCandidate(new RTCIceCandidate(lista[candidatosAplicadosIndex])); } catch (e) {}
    }
  }

  async function iniciarLlamada() {
    if (callState !== 'inactiva') return;
    desbloquearAudio();
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch (e) {
      alert('No se pudo acceder a la cámara o al micrófono.');
      return;
    }
    callState = 'llamando_saliente';
    mostrarOverlayLlamada('saliente');
    mostrarVideoLocal(localStream);
    crearPeerConnection();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    try {
      const res = await fetch('/api/call', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'iniciar', de: miNombre, oferta: { type: offer.type, sdp: offer.sdp } })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        mostrarErrorLlamada(data.error || 'No se pudo iniciar la llamada.');
        setTimeout(() => terminarLlamada(true), 1800);
        return;
      }
      callId = data.callId;
      candidatosAplicadosIndex = 0;
      iniciarTonoLlamada();
      ringTimeout = setTimeout(() => {
        if (callState === 'llamando_saliente') {
          mostrarErrorLlamada('El otro nodo no contestó.');
          setTimeout(() => terminarLlamada(), 1500);
        }
      }, 30000);
    } catch (e) {
      mostrarErrorLlamada('Error de conexión.');
      setTimeout(() => terminarLlamada(true), 1800);
    }
  }

  async function aceptarLlamada() {
    detenerTonoLlamada();
    desbloquearAudio();
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch (e) {
      mostrarErrorLlamada('No se pudo acceder a la cámara o al micrófono.');
      await rechazarLlamada();
      return;
    }
    mostrarVideoLocal(localStream);
    crearPeerConnection();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    await pc.setRemoteDescription(new RTCSessionDescription(ofertaEntrante));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    try {
      const res = await fetch('/api/call', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'aceptar', de: miNombre, callId, respuesta: { type: answer.type, sdp: answer.sdp } })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        mostrarErrorLlamada(data.error || 'La llamada ya no está disponible.');
        setTimeout(() => terminarLlamada(true), 1800);
        return;
      }
      callState = 'en_llamada';
      mostrarOverlayLlamada('activa');
      const full = await (await fetch('/api/call')).json();
      await aplicarCandidatosNuevos(full);
    } catch (e) {
      mostrarErrorLlamada('Error de conexión.');
      setTimeout(() => terminarLlamada(true), 1800);
    }
  }

  async function rechazarLlamada() {
    detenerTonoLlamada();
    try {
      await fetch('/api/call', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'rechazar', de: miNombre, callId })
      });
    } catch (e) {}
    finalizarLocalUI();
  }

  async function terminarLlamada(sinNotificar) {
    detenerTonoLlamada();
    if (ringTimeout) { clearTimeout(ringTimeout); ringTimeout = null; }
    if (!sinNotificar) {
      try {
        await fetch('/api/call', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accion: 'terminar', de: miNombre, callId })
        });
      } catch (e) {}
    }
    finalizarLocalUI();
  }

  function finalizarLocalUI() {
    if (pc) { try { pc.close(); } catch (e) {} pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    callState = 'inactiva';
    callId = null;
    ofertaEntrante = null;
    candidatosAplicadosIndex = 0;
    ocultarOverlayLlamada();
    if (navigator.vibrate) navigator.vibrate(0);
  }

  async function pollLlamada() {
    try {
      const res = await fetch('/api/call');
      const data = await res.json();
      await manejarEstadoLlamada(data);
    } catch (e) {}
  }

  async function manejarEstadoLlamada(data) {
    if (data.estado === 'llamando') {
      if (callState === 'inactiva' && data.llamador && data.llamador !== miNombre) {
        callState = 'llamando_entrante';
        callId = data.callId;
        candidatosAplicadosIndex = 0;
        ofertaEntrante = data.oferta;
        mostrarOverlayLlamada('entrante', data.llamador);
        iniciarTonoLlamada();
        return;
      }
      return;
    }

    if (data.estado === 'aceptada' && data.callId === callId) {
      if (callState === 'llamando_saliente' && pc) {
        detenerTonoLlamada();
        if (ringTimeout) { clearTimeout(ringTimeout); ringTimeout = null; }
        await pc.setRemoteDescription(new RTCSessionDescription(data.respuesta));
        callState = 'en_llamada';
        mostrarOverlayLlamada('activa');
      }
      await aplicarCandidatosNuevos(data);
      return;
    }

    if (data.estado === 'rechazada' && data.callId === callId && callState === 'llamando_saliente') {
      detenerTonoLlamada();
      if (ringTimeout) { clearTimeout(ringTimeout); ringTimeout = null; }
      mostrarErrorLlamada('El otro nodo rechazó la llamada.');
      setTimeout(() => terminarLlamada(true), 1800);
      return;
    }

    if (data.estado === 'inactiva') {
      if (['llamando_entrante', 'en_llamada', 'llamando_saliente'].includes(callState)) {
        mostrarErrorLlamada('El otro nodo colgó.');
        setTimeout(() => finalizarLocalUI(), 1200);
      }
      return;
    }
  }

  document.getElementById('call-btn').addEventListener('click', iniciarLlamada);
  document.getElementById('btn-aceptar-llamada').addEventListener('click', aceptarLlamada);

  // ---- Presencia (en línea / última conexión) ----
  function enviarPresencia(readUpTo) {
    if (!miNombre) return;
    const body = { de: miNombre };
    if (readUpTo) body.readUpTo = readUpTo;
    fetch('/api/presence', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).catch(() => {});
  }

  function marcarLeido(hora) {
    enviarPresencia(hora);
  }

  function formatUltimaConexion(ts) {
    if (!ts) return 'Sin conexión aún';
    const d = new Date(ts);
    const hoy = new Date();
    const esHoy = d.toDateString() === hoy.toDateString();
    const hora = d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    if (esHoy) return `Última vez hoy a las ${hora}`;
    const fecha = d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
    return `Última vez el ${fecha} a las ${hora}`;
  }

  function dispararPulsoConexion() {
    const pulse = document.getElementById('connect-pulse');
    if (!pulse) return;
    pulse.classList.remove('active');
    void pulse.offsetWidth; // reinicia la animación si ya estaba corriendo
    pulse.classList.add('active');
  }

  async function pollPresence() {
    if (!miNodo) return;
    try {
      const res = await fetch('/api/presence');
      const estado = await res.json();
      const info = estado[miNodo];
      const dot = document.getElementById('partner-dot');
      const lastSeenEl = document.getElementById('partner-lastseen');
      if (!info) return;
      if (info.online) {
        dot.classList.add('online');
        lastSeenEl.textContent = 'En línea';
        if (partnerWasOnline === false) dispararPulsoConexion();
        partnerWasOnline = true;
      } else {
        dot.classList.remove('online');
        lastSeenEl.textContent = formatUltimaConexion(info.lastSeen);
        partnerWasOnline = false;
      }
      if (info.readUpTo !== partnerReadUpTo) {
        partnerReadUpTo = info.readUpTo || 0;
        if (lastMsgs.length) renderMessages(lastMsgs);
      }
    } catch (e) {}
  }

  // ---- Racha de días conectados ----
  function calcularRacha(msgs) {
    if (!msgs.length) return 0;
    const dias = new Set(msgs.map((m) => new Date(m.hora).toDateString()));
    const cursor = new Date();
    if (!dias.has(cursor.toDateString())) cursor.setDate(cursor.getDate() - 1);
    let racha = 0;
    while (dias.has(cursor.toDateString())) {
      racha++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return racha;
  }

  function actualizarRacha(msgs) {
    const badge = document.getElementById('streak-badge');
    if (!badge) return;
    const racha = calcularRacha(msgs);
    if (racha >= 2) {
      badge.textContent = `🔥 ${racha}`;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  // Marcar presencia también cuando la pestaña vuelve a tener foco,
  // y detener los timers si el usuario cierra/recarga la ventana.
  document.addEventListener('visibilitychange', () => { if (!document.hidden) enviarPresencia(); });
  window.addEventListener('beforeunload', () => {
    if (presenceHeartbeat) clearInterval(presenceHeartbeat);
    if (presencePoll) clearInterval(presencePoll);
    if (callPollTimer) clearInterval(callPollTimer);
  });

  let lastTypingPost = 0;
  draftInput.addEventListener('input', () => {

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

  function formatHora(ts) {
    return new Date(ts).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function findSticker(packId, index) {
    const pack = stickerPacks.find(p => p.id === packId);
    if (!pack) return null;
    return pack.stickers[index] || null;
  }

  function renderReactionChips(m) {
    if (!m.reacciones) return '';
    const chips = Object.entries(m.reacciones)
      .filter(([, lista]) => lista.length > 0)
      .map(([emoji, lista]) => {
        const mineReacted = lista.includes(miNombre);
        return `<span class="reaction-chip ${mineReacted ? 'mine-reacted' : ''}" data-id="${m.id}" data-emoji="${emoji}">${emoji} ${lista.length}</span>`;
      }).join('');
    return chips ? `<div class="reaction-chips">${chips}</div>` : '';
  }

  function renderTicks(m, mine) {
    if (!mine) return '';
    const leido = partnerReadUpTo >= m.hora;
    return `<span class="ticks ${leido ? 'read' : ''}">${leido ? '✓✓' : '✓'}</span>`;
  }

  function renderMessages(msgs) {
    if (!msgs.length) {
      messagesEl.innerHTML = '<p class="empty-msg">Todavía no hay mensajes. Escribe el primero.</p>';
      return;
    }
    const wasAtBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 40;
    messagesEl.innerHTML = msgs.map(m => {
      const mine = m.de === miNombre;
      let inner;
      if (m.sticker) {
        const src = findSticker(m.sticker.packId, m.sticker.index);
        inner = `<div class="bubble media-bubble" data-id="${m.id}">${src ? `<img src="${src}" alt="sticker"/>` : '<div class="sticker-empty">sticker no disponible</div>'}<div class="time">${formatHora(m.hora)}${renderTicks(m, mine)}</div></div>`;
      } else if (m.imagen) {
        inner = `<div class="bubble media-bubble" data-id="${m.id}"><img src="${m.imagen}" alt="foto"/><div class="time">${formatHora(m.hora)}${renderTicks(m, mine)}</div></div>`;
      } else if (m.audio) {
        inner = `<div class="bubble audio-bubble ${mine ? 'mine' : 'theirs'}" data-id="${m.id}"><audio controls src="${m.audio}"></audio><div class="time">${formatHora(m.hora)}${renderTicks(m, mine)}</div></div>`;
      } else {
        inner = `<div class="bubble ${mine ? 'mine' : 'theirs'}" data-id="${m.id}">${!mine ? `<div class="sender">${escapeHtml(m.de)}</div>` : ''}<div class="text">${escapeHtml(m.texto || '')}</div><div class="time">${formatHora(m.hora)}${renderTicks(m, mine)}</div></div>`;
      }
      return `<div class="msg-row ${mine ? 'mine' : 'theirs'}">${inner}${renderReactionChips(m)}</div>`;
    }).join('');
    if (wasAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    attachLongPress();
    attachChipListeners();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Envío de mensajes ----
  composer.addEventListener('submit', async (e) => {
    e.preventDefault();
    const texto = draftInput.value.trim();
    if (!texto) return;
    draftInput.value = '';
    sendBtn.disabled = true;
    try { await enviarMensaje({ de: miNombre, texto }); }
    finally { sendBtn.disabled = false; }
  });

  async function enviarMensaje(payload) {
    try {
      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const msgs = await res.json();
      lastMsgCount = msgs.length;
      lastMsgs = msgs;
      renderMessages(msgs);
      actualizarRacha(msgs);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (e) {
      console.error('No se pudo enviar', e);
    }
  }

  pensandoBtn.addEventListener('click', () => {
    enviarMensaje({ de: miNombre, texto: '💭 Pensando en ti' });
  });

  // ---- Menú adjuntar (sticker / foto) ----
  attachToggle.addEventListener('click', () => {
    closeAllPanels(attachMenu.classList.contains('hidden') ? attachMenu : null);
  });
  optSticker.addEventListener('click', () => { closeAllPanels(stickerPanel); });
  optPhoto.addEventListener('click', () => { closeAllPanels(null); photoInput.click(); });

  function closeAllPanels(panelToShow) {
    attachMenu.classList.add('hidden');
    stickerPanel.classList.add('hidden');
    reactionBar.classList.add('hidden');
    if (panelToShow) panelToShow.classList.remove('hidden');
  }

  // ---- Stickers ----
  async function loadStickerPacks() {
    try {
      const res = await fetch('/api/stickers');
      stickerPacks = await res.json();
      if (!activePackId && stickerPacks.length) activePackId = stickerPacks[0].id;
      renderStickerTabs();
      renderStickerGrid();
    } catch (e) { console.error('No se pudieron cargar los stickers', e); }
  }

  function renderStickerTabs() {
    const tabsHtml = stickerPacks.map(p => `<div class="sticker-tab ${p.id === activePackId ? 'active' : ''}" data-pack="${p.id}">${escapeHtml(p.nombre)}</div>`).join('');
    stickerTabs.innerHTML = tabsHtml + `<div class="sticker-tab add-tab" id="add-pack-tab">+ paquete</div>`;
    stickerTabs.querySelectorAll('.sticker-tab[data-pack]').forEach(el => {
      el.addEventListener('click', () => { activePackId = el.dataset.pack; renderStickerTabs(); renderStickerGrid(); });
    });
    document.getElementById('add-pack-tab').addEventListener('click', () => fileInput.click());
  }

  function renderStickerGrid() {
    const pack = stickerPacks.find(p => p.id === activePackId);
    if (!pack) { stickerGrid.innerHTML = `<div class="sticker-empty">Todavía no hay paquetes.<br/>Toca "+ paquete" para subir el primero.</div>`; return; }
    stickerGrid.innerHTML = pack.stickers.map((src, i) => `<img src="${src}" data-index="${i}" />`).join('');
    stickerGrid.querySelectorAll('img').forEach(img => {
      img.addEventListener('click', async () => {
        closeAllPanels(null);
        await enviarMensaje({ de: miNombre, sticker: { packId: pack.id, index: Number(img.dataset.index) } });
      });
    });
  }

  fileInput.addEventListener('change', async () => {
    const files = Array.from(fileInput.files || []);
    if (!files.length) return;
    const nombre = prompt('¿Cómo se llama este paquete de stickers?', 'Mi paquete');
    if (!nombre) { fileInput.value = ''; return; }
    attachToggle.disabled = true;
    try {
      const stickers = [];
      for (const file of files.slice(0, 30)) stickers.push(await resizeImage(file, 320, 0.8));
      const res = await fetch('/api/stickers', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, stickers })
      });
      const packs = await res.json();
      if (Array.isArray(packs)) {
        stickerPacks = packs;
        activePackId = packs[packs.length - 1]?.id || activePackId;
        renderStickerTabs(); renderStickerGrid();
      }
    } catch (e) {
      alert('No se pudo subir el paquete. Intenta con imágenes más ligeras.');
    } finally { attachToggle.disabled = false; fileInput.value = ''; }
  });

  // ---- Foto normal ----
  photoInput.addEventListener('change', async () => {
    const file = photoInput.files && photoInput.files[0];
    if (!file) return;
    sendBtn.disabled = true;
    try {
      const imagen = await resizeImage(file, 900, 0.82);
      await enviarMensaje({ de: miNombre, imagen });
    } catch (e) {
      alert('No se pudo enviar la foto.');
    } finally { sendBtn.disabled = false; photoInput.value = ''; }
  });

  function resizeImage(file, maxSize, calidad) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxSize) { height = Math.round(height * (maxSize / width)); width = maxSize; }
          else if (height > maxSize) { width = Math.round(width * (maxSize / height)); height = maxSize; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/webp', calidad));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---- Notas de voz ----
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        if (blob.size < 200) return;
        const reader = new FileReader();
        reader.onload = async () => {
          await enviarMensaje({ de: miNombre, audio: reader.result });
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      recordBtn.classList.add('recording');
      recordBtn.textContent = '🔴';
    } catch (e) {
      alert('No se pudo acceder al micrófono.');
    }
  }
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    recordBtn.classList.remove('recording');
    recordBtn.textContent = '🎤';
  }
  recordBtn.addEventListener('mousedown', startRecording);
  recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
  recordBtn.addEventListener('mouseup', stopRecording);
  recordBtn.addEventListener('mouseleave', stopRecording);
  recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

  // ---- Reacciones (mantener presionado un mensaje) ----
  function attachLongPress() {
    document.querySelectorAll('.bubble[data-id]').forEach(bubble => {
      let timer;
      const start = () => { timer = setTimeout(() => openReactionBar(bubble.dataset.id), 450); };
      const cancel = () => clearTimeout(timer);
      bubble.addEventListener('touchstart', start);
      bubble.addEventListener('touchend', cancel);
      bubble.addEventListener('touchmove', cancel);
      bubble.addEventListener('mousedown', start);
      bubble.addEventListener('mouseup', cancel);
      bubble.addEventListener('mouseleave', cancel);
    });
  }

  function attachChipListeners() {
    document.querySelectorAll('.reaction-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        reaccionar(chip.dataset.id, chip.dataset.emoji);
      });
    });
  }

  function openReactionBar(messageId) {
    reactionTarget = messageId;
    closeAllPanels(reactionBar);
  }

  reactionBar.querySelectorAll('span[data-emoji]').forEach(span => {
    span.addEventListener('click', () => {
      if (reactionTarget) reaccionar(reactionTarget, span.dataset.emoji);
      closeAllPanels(null);
    });
  });

  async function reaccionar(messageId, emoji) {
    try {
      const res = await fetch('/api/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'reaccionar', messageId, emoji, de: miNombre })
      });
      const msgs = await res.json();
      lastMsgs = msgs;
      renderMessages(msgs);
    } catch (e) {}
  }

  // ---- PWA: registrar service worker ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
