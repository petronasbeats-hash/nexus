<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>NEXUS</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000;
    color: #cffafe;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; height: 100dvh; padding: 24px; }
  .hidden { display: none !important; }
  .logo-wrap { margin-bottom: 8px; }
  h1.brand {
    font-size: 2.4rem; font-weight: 300; letter-spacing: 0.25em;
    color: #67e8f9; text-shadow: 0 0 20px rgba(34,211,238,0.6);
    margin: 0 0 16px; text-align: center;
  }
  p.tag1 { color: rgba(207,250,254,0.7); font-size: 0.9rem; text-align: center; margin: 0 0 4px; }
  p.tag2 { color: rgba(207,250,254,0.5); font-size: 0.78rem; text-align: center; margin: 0 0 32px; line-height: 1.5; }
  .card { width: 100%; max-width: 360px; }
  .node-label { color: rgba(6,182,212,0.7); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.2em; text-align: center; margin-bottom: 16px; }
  button.node-btn {
    width: 100%; background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.6);
    color: #cffafe; font-family: inherit; font-weight: 500; font-size: 1rem;
    border-radius: 10px; padding: 14px; margin-bottom: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  button.node-btn:hover { background: rgba(22,78,99,0.4); border-color: #22d3ee; box-shadow: 0 0 15px rgba(34,211,238,0.25); }
  button.node-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { color: #f87171; font-size: 0.78rem; text-align: center; margin-top: 12px; line-height: 1.5; }
  .footnote { color: #164e63; font-size: 0.72rem; text-align: center; margin-top: 32px; display: flex; align-items: center; justify-content: center; gap: 6px; }

  /* Chat */
  .chat-app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }
  header.chat-header {
    border-bottom: 1px solid rgba(22,78,99,0.5); padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  header.chat-header .brand-mini { display: flex; align-items: center; gap: 8px; }
  header.chat-header .brand-mini span { color: #67e8f9; font-size: 0.85rem; letter-spacing: 0.2em; text-shadow: 0 0 10px rgba(34,211,238,0.5); }
  header.chat-header .who { color: #0e7490; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .empty-msg { color: #164e63; font-size: 0.85rem; text-align: center; margin-top: 40px; }
  .msg-row { display: flex; }
  .msg-row.mine { justify-content: flex-end; }
  .msg-row.theirs { justify-content: flex-start; }
  .bubble { max-width: 75%; border-radius: 14px; padding: 8px 12px; font-size: 0.9rem; }
  .bubble.mine { background: #22d3ee; color: #020617; }
  .bubble.theirs { background: rgba(8,51,68,0.4); color: #cffafe; border: 1px solid rgba(21,94,117,0.5); }
  .bubble .sender { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: #06b6d4; margin-bottom: 2px; }
  .bubble .time { font-size: 0.62rem; margin-top: 4px; text-align: right; }
  .bubble.mine .time { color: rgba(2,6,23,0.6); }
  .bubble.theirs .time { color: #155e75; }
  .bubble.sticker-bubble { background: transparent; border: none; padding: 0; max-width: 45%; }
  .bubble.sticker-bubble img { width: 100%; border-radius: 10px; display: block; }
  .bubble.sticker-bubble .time { text-align: inherit; color: #155e75; margin-top: 2px; }

  form.composer {
    border-top: 1px solid rgba(22,78,99,0.5); padding: 12px; display: flex; gap: 8px; flex-shrink: 0;
    position: relative;
  }
  form.composer input {
    flex: 1; background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5);
    border-radius: 10px; padding: 10px 14px; color: #ecfeff; font-family: inherit; font-size: 0.9rem;
  }
  form.composer input::placeholder { color: #155e75; }
  form.composer input:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 0 2px rgba(34,211,238,0.3); }
  form.composer button {
    background: #22d3ee; border: none; border-radius: 10px; padding: 0 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  form.composer button:disabled { background: #083344; cursor: not-allowed; }
  button.sticker-toggle {
    background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5);
    border-radius: 10px; padding: 0 12px; cursor: pointer; font-size: 1.1rem;
    color: #67e8f9; flex-shrink: 0;
  }

  /* Panel de stickers */
  .sticker-panel {
    position: absolute; left: 0; right: 0; bottom: 100%;
    background: #050b0e; border-top: 1px solid rgba(22,78,99,0.5);
    max-height: 55vh; display: flex; flex-direction: column;
  }
  .sticker-tabs {
    display: flex; gap: 6px; padding: 10px 10px 0; overflow-x: auto; flex-shrink: 0;
  }
  .sticker-tab {
    background: rgba(8,51,68,0.3); border: 1px solid rgba(21,94,117,0.5); color: #a5f3fc;
    border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; white-space: nowrap; cursor: pointer;
  }
  .sticker-tab.active { border-color: #22d3ee; background: rgba(34,211,238,0.15); }
  .sticker-tab.add-tab { color: #67e8f9; font-weight: bold; }
  .sticker-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 10px; overflow-y: auto;
  }
  .sticker-grid img {
    width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 8px;
    background: rgba(8,51,68,0.2); cursor: pointer; border: 1px solid transparent;
  }
  .sticker-grid img:active { border-color: #22d3ee; }
  .sticker-empty { color: #164e63; font-size: 0.8rem; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="join-screen" class="screen">
  <div class="card">
    <div class="logo-wrap" style="display:flex; justify-content:center;">
      <svg viewBox="0 0 200 120" width="160" height="96" fill="none">
        <g stroke="#22d3ee" stroke-width="1" opacity="0.55">
          <path d="M40 60 L100 20 L160 60 L100 40 Z" />
          <path d="M40 60 L100 100 L160 60 L100 80 Z" />
          <path d="M40 60 L100 20 L160 60 L100 100 Z" />
        </g>
        <line x1="40" y1="60" x2="160" y2="60" stroke="#67e8f9" stroke-width="2" />
        <circle cx="40" cy="60" r="9" fill="#083344" stroke="#22d3ee" stroke-width="2" />
        <circle cx="40" cy="60" r="4" fill="#a5f3fc" />
        <circle cx="160" cy="60" r="9" fill="#083344" stroke="#22d3ee" stroke-width="2" />
        <circle cx="160" cy="60" r="4" fill="#a5f3fc" />
        <circle cx="40" cy="60" r="9" fill="none" stroke="#22d3ee" stroke-width="1">
          <animate attributeName="r" values="9;18;9" dur="2.5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite" />
        </circle>
        <circle cx="160" cy="60" r="9" fill="none" stroke="#22d3ee" stroke-width="1">
          <animate attributeName="r" values="9;18;9" dur="2.5s" repeatCount="indefinite" begin="0.4s" />
          <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite" begin="0.4s" />
        </circle>
      </svg>
    </div>
    <h1 class="brand">NEXUS</h1>
    <p class="tag1">Nexus fue creado pensando en ti.</p>
    <p class="tag2">Nuestro punto de conexión segura — pase lo que pase,<br/>siempre hay una forma de encontrarnos.</p>

    <p class="node-label">Elige tu nodo</p>
    <button class="node-btn" id="btn-zapien">Zapien</button>
    <button class="node-btn" id="btn-noriega">Noriega</button>
    <p class="error-msg hidden" id="join-error"></p>

    <p class="footnote">🔒 Toca el nombre de la otra persona, no el tuyo.</p>
  </div>
</div>

<div id="chat-screen" class="chat-app hidden">
  <header class="chat-header">
    <div class="brand-mini">
      <svg viewBox="0 0 200 120" width="32" height="19" fill="none">
        <line x1="40" y1="60" x2="160" y2="60" stroke="#67e8f9" stroke-width="4" />
        <circle cx="40" cy="60" r="14" fill="#083344" stroke="#22d3ee" stroke-width="3" />
        <circle cx="160" cy="60" r="14" fill="#083344" stroke="#22d3ee" stroke-width="3" />
      </svg>
      <span>NEXUS</span>
    </div>
    <span class="who">🔒 Mi nodo: <span id="mi-nombre"></span></span>
  </header>

  <div class="messages" id="messages"></div>

  <form class="composer" id="composer">
    <div class="sticker-panel hidden" id="sticker-panel">
      <div class="sticker-tabs" id="sticker-tabs"></div>
      <div class="sticker-grid" id="sticker-grid"></div>
    </div>
    <button type="button" class="sticker-toggle" id="sticker-toggle">🖼️</button>
    <input id="draft" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
    <button type="submit" id="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="2.5">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
      </svg>
    </button>
  </form>
  <input type="file" id="file-input" accept="image/*" multiple class="hidden" />
</div>

<script>
  const POLL_MS = 2500;
  let miNombre = null;
  let pollTimer = null;
  let stickerPacks = [];
  let activePackId = null;

  const joinScreen = document.getElementById('join-screen');
  const chatScreen = document.getElementById('chat-screen');
  const joinError = document.getElementById('join-error');
  const messagesEl = document.getElementById('messages');
  const composer = document.getElementById('composer');
  const draftInput = document.getElementById('draft');
  const sendBtn = document.getElementById('send-btn');
  const stickerToggle = document.getElementById('sticker-toggle');
  const stickerPanel = document.getElementById('sticker-panel');
  const stickerTabs = document.getElementById('sticker-tabs');
  const stickerGrid = document.getElementById('sticker-grid');
  const fileInput = document.getElementById('file-input');

  document.getElementById('btn-zapien').addEventListener('click', () => join('Zapien'));
  document.getElementById('btn-noriega').addEventListener('click', () => join('Noriega'));

  async function join(nombreQueBuscas) {
    joinError.classList.add('hidden');
    document.getElementById('btn-zapien').disabled = true;
    document.getElementById('btn-noriega').disabled = true;
    try {
      const res = await fetch('/api/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombreQueBuscas })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        joinError.textContent = data.error || 'No se pudo entrar.';
        joinError.classList.remove('hidden');
        document.getElementById('btn-zapien').disabled = false;
        document.getElementById('btn-noriega').disabled = false;
        return;
      }
      miNombre = data.miNombre;
      document.getElementById('mi-nombre').textContent = nombreQueBuscas;
      joinScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      await refreshMessages();
      await loadStickerPacks();
      pollTimer = setInterval(refreshMessages, POLL_MS);
    } catch (e) {
      joinError.textContent = 'Error de conexión. Intenta de nuevo.';
      joinError.classList.remove('hidden');
      document.getElementById('btn-zapien').disabled = false;
      document.getElementById('btn-noriega').disabled = false;
    }
  }

  async function refreshMessages() {
    try {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (e) {
      console.error('No se pudo actualizar', e);
    }
  }

  function formatHora(ts) {
    return new Date(ts).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function findSticker(packId, index) {
    const pack = stickerPacks.find(p => p.id === packId);
    if (!pack) return null;
    return pack.stickers[index] || null;
  }

  function renderMessages(msgs) {
    if (!msgs.length) {
      messagesEl.innerHTML = '<p class="empty-msg">Todavía no hay mensajes. Escribe el primero.</p>';
      return;
    }
    const wasAtBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 40;
    messagesEl.innerHTML = msgs.map(m => {
      const mine = m.de === miNombre;
      if (m.sticker) {
        const src = findSticker(m.sticker.packId, m.sticker.index);
        const img = src ? `<img src="${src}" alt="sticker" />` : `<div class="sticker-empty">sticker no disponible</div>`;
        return `
          <div class="msg-row ${mine ? 'mine' : 'theirs'}">
            <div class="bubble sticker-bubble">
              ${img}
              <div class="time">${formatHora(m.hora)}</div>
            </div>
          </div>`;
      }
      return `
        <div class="msg-row ${mine ? 'mine' : 'theirs'}">
          <div class="bubble ${mine ? 'mine' : 'theirs'}">
            ${!mine ? `<div class="sender">${escapeHtml(m.de)}</div>` : ''}
            <div class="text">${escapeHtml(m.texto || '')}</div>
            <div class="time">${formatHora(m.hora)}</div>
          </div>
        </div>`;
    }).join('');
    if (wasAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  composer.addEventListener('submit', async (e) => {
    e.preventDefault();
    const texto = draftInput.value.trim();
    if (!texto) return;
    draftInput.value = '';
    sendBtn.disabled = true;
    try {
      await enviarMensaje({ de: miNombre, texto });
    } finally {
      sendBtn.disabled = false;
    }
  });

  async function enviarMensaje(payload) {
    try {
      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const msgs = await res.json();
      renderMessages(msgs);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (e) {
      console.error('No se pudo enviar', e);
    }
  }

  // ---- Stickers ----

  stickerToggle.addEventListener('click', () => {
    stickerPanel.classList.toggle('hidden');
  });

  async function loadStickerPacks() {
    try {
      const res = await fetch('/api/stickers');
      stickerPacks = await res.json();
      if (!activePackId && stickerPacks.length) activePackId = stickerPacks[0].id;
      renderStickerTabs();
      renderStickerGrid();
    } catch (e) {
      console.error('No se pudieron cargar los stickers', e);
    }
  }

  function renderStickerTabs() {
    const tabsHtml = stickerPacks.map(p => `
      <div class="sticker-tab ${p.id === activePackId ? 'active' : ''}" data-pack="${p.id}">${escapeHtml(p.nombre)}</div>
    `).join('');
    stickerTabs.innerHTML = tabsHtml + `<div class="sticker-tab add-tab" id="add-pack-tab">+ paquete</div>`;

    stickerTabs.querySelectorAll('.sticker-tab[data-pack]').forEach(el => {
      el.addEventListener('click', () => {
        activePackId = el.dataset.pack;
        renderStickerTabs();
        renderStickerGrid();
      });
    });
    document.getElementById('add-pack-tab').addEventListener('click', () => {
      fileInput.click();
    });
  }

  function renderStickerGrid() {
    const pack = stickerPacks.find(p => p.id === activePackId);
    if (!pack) {
      stickerGrid.innerHTML = `<div class="sticker-empty">Todavía no hay paquetes.<br/>Toca "+ paquete" para subir el primero.</div>`;
      return;
    }
    stickerGrid.innerHTML = pack.stickers.map((src, i) => `<img src="${src}" data-index="${i}" />`).join('');
    stickerGrid.querySelectorAll('img').forEach(img => {
      img.addEventListener('click', async () => {
        stickerPanel.classList.add('hidden');
        await enviarMensaje({
          de: miNombre,
          sticker: { packId: pack.id, index: Number(img.dataset.index) }
        });
      });
    });
  }

  fileInput.addEventListener('change', async () => {
    const files = Array.from(fileInput.files || []);
    if (!files.length) return;
    const nombre = prompt('¿Cómo se llama este paquete de stickers?', 'Mi paquete');
    if (!nombre) { fileInput.value = ''; return; }

    stickerToggle.disabled = true;
    try {
      const stickers = [];
      for (const file of files.slice(0, 30)) {
        const resized = await resizeImage(file, 320);
        stickers.push(resized);
      }
      const res = await fetch('/api/stickers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, stickers })
      });
      const packs = await res.json();
      if (Array.isArray(packs)) {
        stickerPacks = packs;
        activePackId = packs[packs.length - 1]?.id || activePackId;
        renderStickerTabs();
        renderStickerGrid();
      }
    } catch (e) {
      console.error('No se pudo subir el paquete', e);
      alert('No se pudo subir el paquete de stickers. Intenta con imágenes más ligeras.');
    } finally {
      stickerToggle.disabled = false;
      fileInput.value = '';
    }
  });

  function resizeImage(file, maxSize) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxSize) {
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          } else if (height > maxSize) {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/webp', 0.8));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
